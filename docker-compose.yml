version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: blood_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - blood_network

  nginx:
    image: nginx:alpine
    container_name: blood_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blood_network

  postgres:
    image: postgres:17-alpine  
    container_name: blood_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blood_donation
      POSTGRES_USER: blood_user
      POSTGRES_PASSWORD: blood_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blood_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: blood_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - blood_network

networks:
  blood_network:
    driver: bridge

volumes:
  postgres_data:

